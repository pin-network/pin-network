<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 165 96" width="165" height="96">
  <!-- PiN - Pi Integrated Network -->
  <!-- P stem -->
  <line x1="18" y1="20" x2="18" y2="80" stroke="#7F77DD" stroke-width="6" stroke-linecap="round"/>
  <!-- P bowl flowing into pi crossbar -->
  <path d="M18 20 Q54 20 54 40 Q54 58 18 57" fill="none" stroke="#7F77DD" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- pi crossbar: gentle downward arc -->
  <path d="M42 38 Q90 44 138 38" fill="none" stroke="#7F77DD" stroke-width="6" stroke-linecap="round"/>
  <!-- left leg of pi = i -->
  <line x1="62" y1="40" x2="62" y2="80" stroke="#7F77DD" stroke-width="6" stroke-linecap="round"/>
  <!-- dot over left leg = dot of i -->
  <circle cx="62" cy="21" r="6.5" fill="#AFA9EC"/>
  <!-- right leg of pi = n, serif foot -->
  <line x1="118" y1="39" x2="118" y2="80" stroke="#7F77DD" stroke-width="6" stroke-linecap="round"/>
  <line x1="109" y1="80" x2="127" y2="80" stroke="#7F77DD" stroke-width="3.5" stroke-linecap="round"/>
  <!-- signal bars superscript top-right -->
  <rect x="141" y="30" width="4.5" height="9" rx="1.5" fill="#CECBF6"/>
  <rect x="148" y="22" width="4.5" height="17" rx="1.5" fill="#AFA9EC"/>
  <rect x="155" y="13" width="4.5" height="26" rx="1.5" fill="#7F77DD"/>
</svg>
